[config]
refresh_rate = "1s"

[server]
address = "0.0.0.0:8000"
url = "http://localhost:5173"
max_content_length = "5GB"
upload_path = "/upload"
timeout = "30s"
expose_version = true
expose_list = true
auth_tokens = ["dev-token"]
delete_tokens = ["dev-token"]
handle_spaces = "replace"

[landing_page]
text = "rustypaste-ui dev server"
content_type = "text/plain; charset=utf-8"

[paste]
random_url = { type = "alphanumeric", length = 6, suffix_mode = true }
default_extension = "txt"
mime_override = [
  { mime = "image/jpeg", regex = "^.*\\.jpg$" },
  { mime = "image/png", regex = "^.*\\.png$" },
  { mime = "image/svg+xml", regex = "^.*\\.svg$" },
  { mime = "video/webm", regex = "^.*\\.webm$" },
  { mime = "video/x-matroska", regex = "^.*\\.mkv$" },
  { mime = "application/octet-stream", regex = "^.*\\.bin$" },
  { mime = "text/plain", regex = "^.*\\.(log|txt|diff|sh|rs|toml)$" },
]
mime_blacklist = [
  "application/x-dosexec",
  "application/java-archive",
  "application/java-vm",
  "audio/",
]
text_mime_overrides = ["application/toml", "application/yaml", "application/x-yaml"]
duplicate_files = false
delete_expired_files = { enabled = true, interval = "1h" }
default_expiry = "1d"

[log]
level = "info"
